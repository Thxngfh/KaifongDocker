version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: kaifong_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kaifong
      POSTGRES_PASSWORD: kaifong1234
      POSTGRES_DB: kaifongdb
    ports:
      - "5433:5432"
    volumes:
      - kaifong_db:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaifong -d kaifongdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  kaifongliff:
    build: ./kaifongliff
    container_name: kaifongliff
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: kaifong
      DB_PASSWORD: kaifong1234
      DB_NAME: kaifongdb
    volumes:
      - ./kaifongliff/uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy

  kaifongai:
    build: ./kaifongai
    container_name: kaifongai
    ports:
      - "3001:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: kaifong
      DB_PASSWORD: kaifong1234
      DB_NAME: kaifongdb
    depends_on:
      postgres:
        condition: service_healthy

  kaifong_ai_v2:
    build: ./kaifong_ai_v2
    container_name: kaifong_ai_v2
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://kaifong:kaifong1234@postgres:5432/kaifongdb
      LINE_CHANNEL_ACCESS_TOKEN: 2009976440-qF0Wpy5x
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  kaifong_db:
      
