version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: kaifong_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kaifong
      POSTGRES_PASSWORD: kaifong1234
      POSTGRES_DB: kaifongdb
    ports:
      - "5433:5432"
    volumes:
      - kaifong_db:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaifong -d kaifongdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  kaifongliff:
    build: ./kaifongliff
    container_name: kaifongliff
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  kaifongai:
    build: ./kaifongai
    container_name: kaifongai
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  kaifong_db:
      
