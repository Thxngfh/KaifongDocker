services:
  db:
    image: postgres:16
    container_name: kaifong-db
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kaifong
    volumes:
      - ./kaifong-db:/var/lib/postgresql/data

  kaifongliff:
    build: ./kaifongliff
    container_name: kaifongliff
    ports:
      - "3000:3000"
    depends_on:
      - db

  kaifongai:
    build: ./kaifongai
    container_name: kaifongai
    ports:
      - "3001:3000"
    depends_on:
      - db

volumes:
  pgdata:
